name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore InstallerUpdater.sln

      - name: Build
        run: dotnet build InstallerUpdater.sln --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test src/InstallerService.Tests/InstallerService.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-installerupdater
          path: TestResults/**/coverage.cobertura.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: TestResults/**/coverage.cobertura.xml
          flags: installerupdater
          fail_ci_if_error: false
